services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planificaciones}
      POSTGRES_USER: ${POSTGRES_USER:-planificaciones}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planificaciones_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planificaciones}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: planificaciones_postgres_data
  media_data:
    name: planificaciones_media_data
