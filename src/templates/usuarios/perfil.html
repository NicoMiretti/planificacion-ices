{% extends 'base.html' %}

{% block title %}Mi Perfil - Planificaciones{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Mi Perfil</h2>
    
    <div class="card mt-4" style="max-width: 500px;">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-4">Email</dt>
                <dd class="col-sm-8">{{ user.email }}</dd>
                
                <dt class="col-sm-4">Nombre</dt>
                <dd class="col-sm-8">{{ user.nombre_completo|default:"-" }}</dd>
                
                <dt class="col-sm-4">Rol</dt>
                <dd class="col-sm-8">
                    <span class="badge bg-primary">{{ user.get_rol_display }}</span>
                </dd>
                
                <dt class="col-sm-4">Miembro desde</dt>
                <dd class="col-sm-8">{{ user.date_joined|date:"d/m/Y" }}</dd>
            </dl>
        </div>
    </div>
</div>
{% endblock %}
