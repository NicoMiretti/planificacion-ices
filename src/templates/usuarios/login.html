{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Planificaciones ICES/UCSE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/ices.css' %}" rel="stylesheet">
</head>
<body class="ices-login-page">

<div class="ices-login-card">
    <div class="login-header">
        <div style="display:inline-flex;align-items:center;justify-content:center;
                    width:56px;height:56px;background:var(--ices-blue);border-radius:14px;
                    font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:.75rem;">
            I
        </div>
        <div class="login-title">Sistema de Planificaciones</div>
        <div class="login-subtitle">ICES &mdash; UCSE</div>
    </div>

    {% if form.errors %}
    <div class="alert ices-alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-x-circle-fill"></i>
        <span>Email o contraseña incorrectos.</span>
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="username" class="form-label">Email</label>
            <input type="email" name="username" class="form-control" id="username"
                   placeholder="tu@institucion.edu" required autofocus
                   style="padding:.6rem .85rem;">
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" id="password"
                   required style="padding:.6rem .85rem;">
        </div>
        <button type="submit" class="btn w-100 btn-ices-primary" style="padding:.65rem;font-size:.95rem;">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
